AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  REST API for bdo-market-insights: itemRegistry (DynamoDB, /v1/items) and
  marketQuery (RDS, /v1/market) Lambdas behind API Gateway with an API key and
  usage plan (FR-8..17, ADR-0005). Shares the bdo-common layer from the ETL stack.

# W3005: the SAM transform expands Auth.ApiKeyRequired + Auth.UsagePlan into
# ApiKey / UsagePlan / UsagePlanKey resources that carry both a Ref and an
# auto-generated DependsOn. That redundancy is emitted by the transform, not
# authored here (this template declares no explicit DependsOn), so the warning
# is a false positive and is ignored.
Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W3005

Parameters:
  Stage:
    Type: String
    AllowedValues: [dev, prod]
  BdoRegion:
    Type: String
    Description: Default BDO region (arsha.io validation in itemRegistry POST)
  CommonLayerArn:
    Type: String
    Description: ARN of the shared bdo-common Lambda layer (from the ETL stack)
  DynamoDbTableName:
    Type: String
    Description: per-stage items table name (bdo-<stage>-items)
  LambdaSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: SG for in-VPC Lambdas (marketQuery egress to RDS)
  PrivateSubnetA:
    Type: AWS::EC2::Subnet::Id
    Description: Primary private subnet; marketQuery runs here only (ADR-0011)
  RdsEndpoint:
    Type: String
    Description: RDS Postgres endpoint address
  RdsPort:
    Type: String
    Description: RDS Postgres port
  LambdaRdsAuthRoleArn:
    Type: String
    Description: Execution role for in-VPC Lambdas (VPC + X-Ray + rds-db:connect)
  ApiDomainName:
    Type: String
    Default: ''
    Description: >
      Custom API hostname, e.g. api.example.com (prod) or api.dev.example.com
      (dev). Empty disables the custom domain (ADR-0013). Supplied per stage at
      deploy time; kept out of the committed config.
  HostedZoneId:
    Type: String
    Default: ''
    Description: >
      Route 53 hosted zone ID for the parent domain (e.g. example.com). The zone
      is shared infrastructure owned elsewhere; this stack only adds its own
      cert/record, never the zone (ADR-0013). Required when ApiDomainName is set.
  EnableDemoKey:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      Publish a public read-only demo API key on a tight usage plan (2 req/s
      sustained, 5 burst, 500/day) for "try the API" links. itemRegistry
      rejects writes made with this key, so it is effectively read-only. Off by
      default; enable on the stage you want to expose.

Conditions:
  # Custom domain is opt-in: only built when a hostname is supplied.
  HasCustomDomain: !Not [!Equals [!Ref ApiDomainName, '']]
  # Public demo key is opt-in: only built when explicitly enabled.
  HasDemoKey: !Equals [!Ref EnableDemoKey, 'true']

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Tracing: Active
    Layers:
      - !Ref CommonLayerArn
    Environment:
      Variables:
        STAGE: !Ref Stage
        BDO_REGION: !Ref BdoRegion
        POWERTOOLS_SERVICE_NAME: bdo-market-insights
        POWERTOOLS_METRICS_NAMESPACE: BdoMarket

Resources:
  # ──────────────────────────────────────────────
  # REST API — API key + usage plan (FR-16/17, ADR-0005)
  # ──────────────────────────────────────────────
  BdoApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub 'bdo-${Stage}-api'
      StageName: !Ref Stage
      TracingEnabled: true
      Auth:
        ApiKeyRequired: true
        UsagePlan:
          CreateUsagePlan: PER_API
          Description: !Sub 'bdo-${Stage} default plan: 10 RPS burst / 5 sustained, 1000/day'
          Quota:
            Limit: 1000
            Period: DAY
          Throttle:
            BurstLimit: 10
            RateLimit: 5

  # ──────────────────────────────────────────────
  # Public read-only demo key — optional, off by default
  # A separate, tightly-throttled key for public "try the API" links. API
  # Gateway keys can't be scoped to specific methods, so read-only is enforced
  # in itemRegistry: it rejects writes whose caller apiKeyId matches this key
  # (see DEMO_API_KEY_ID below). The key's *value* is generated by API Gateway
  # and fetched post-deploy (aws apigateway get-api-key --include-value); it is
  # never stored in the repo.
  # ──────────────────────────────────────────────
  DemoApiKey:
    Type: AWS::ApiGateway::ApiKey
    Condition: HasDemoKey
    Properties:
      Name: !Sub 'bdo-${Stage}-demo'
      Description: Public read-only demo key (throttled; writes rejected by itemRegistry)
      Enabled: true

  DemoUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Condition: HasDemoKey
    Properties:
      UsagePlanName: !Sub 'bdo-${Stage}-demo-plan'
      Description: !Sub 'bdo-${Stage} public demo plan: 5 RPS burst / 2 sustained, 500/day'
      ApiStages:
        - ApiId: !Ref BdoApi
          Stage: !Ref Stage
      Throttle:
        BurstLimit: 5
        RateLimit: 2
      Quota:
        Limit: 500
        Period: DAY

  DemoUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Condition: HasDemoKey
    Properties:
      KeyId: !Ref DemoApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref DemoUsagePlan

  # ──────────────────────────────────────────────
  # Custom domain — optional, regional (ADR-0013)
  # ACM cert is DNS-validated through Route 53; CloudFormation writes the
  # validation record into the (externally owned) hosted zone and waits, so the
  # first deploy with a domain blocks for a few minutes on issuance.
  # ──────────────────────────────────────────────
  ApiCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref ApiDomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref ApiDomainName
          HostedZoneId: !Ref HostedZoneId

  ApiDomain:
    Type: AWS::ApiGateway::DomainName
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref ApiDomainName
      RegionalCertificateArn: !Ref ApiCertificate
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2

  # Maps the domain root to the API's deployed stage. The routes already carry
  # the /v1 prefix, so BasePath is left empty (domain root -> stage root).
  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref ApiDomain
      RestApiId: !Ref BdoApi
      Stage: !Ref Stage

  ApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ApiDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiDomain.RegionalHostedZoneId

  # ──────────────────────────────────────────────
  # itemRegistry — DynamoDB registry, not in VPC (FR-8..12)
  # ──────────────────────────────────────────────
  ItemRegistryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'bdo-${Stage}-item-registry'
      CodeUri: ../src/functions/item_registry
      Handler: app.handler
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref DynamoDbTableName
          # ID of the public demo key (empty unless EnableDemoKey=true). When
          # set, itemRegistry rejects writes made with this key id (read-only).
          DEMO_API_KEY_ID: !If [HasDemoKey, !Ref DemoApiKey, '']
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DynamoDbTableName
      Events:
        ListItems:
          Type: Api
          Properties:
            RestApiId: !Ref BdoApi
            Path: /v1/items
            Method: get
        CreateItem:
          Type: Api
          Properties:
            RestApiId: !Ref BdoApi
            Path: /v1/items
            Method: post
        GetItem:
          Type: Api
          Properties:
            RestApiId: !Ref BdoApi
            Path: /v1/items/{item_id}
            Method: get
        UpdateItem:
          Type: Api
          Properties:
            RestApiId: !Ref BdoApi
            Path: /v1/items/{item_id}
            Method: patch
        DeleteItem:
          Type: Api
          Properties:
            RestApiId: !Ref BdoApi
            Path: /v1/items/{item_id}
            Method: delete

  # ──────────────────────────────────────────────
  # marketQuery — RDS reads, in VPC via IAM auth (FR-13..15)
  # ──────────────────────────────────────────────
  MarketQueryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'bdo-${Stage}-market-query'
      CodeUri: ../src/functions/market_query
      Handler: app.handler
      Role: !Ref LambdaRdsAuthRoleArn
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds:
          - !Ref PrivateSubnetA
      Environment:
        Variables:
          DB_HOST: !Ref RdsEndpoint
          DB_PORT: !Ref RdsPort
          DB_NAME: bdo
          DB_USER: lambda_rds_user
          USE_IAM_AUTH: 'true'
      Events:
        Snapshots:
          Type: Api
          Properties:
            RestApiId: !Ref BdoApi
            Path: /v1/market/items/{item_id}/snapshots
            Method: get
        Daily:
          Type: Api
          Properties:
            RestApiId: !Ref BdoApi
            Path: /v1/market/items/{item_id}/daily
            Method: get
        Analysis:
          Type: Api
          Properties:
            RestApiId: !Ref BdoApi
            Path: /v1/market/items/{item_id}/analysis
            Method: get
        Insights:
          Type: Api
          Properties:
            RestApiId: !Ref BdoApi
            Path: /v1/insights
            Method: get

  # ──────────────────────────────────────────────
  # docs — serves the OpenAPI spec + Swagger UI (ADR-0005)
  # ──────────────────────────────────────────────
  # Publishes the API contract over the gateway itself. Both routes set
  # Auth.ApiKeyRequired: false to override the API-wide key requirement, so the
  # spec and Swagger UI are reachable without a key (discovery). The makefile
  # build bundles the merged infra/openapi.yaml (from scripts/export_openapi.py)
  # into the package; PyYAML is vendored per-function (not in the shared layer).
  DocsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: !Sub 'bdo-${Stage}-docs'
      CodeUri: ../src/functions/docs
      Handler: app.handler
      MemorySize: 128
      Events:
        OpenApiSpec:
          Type: Api
          Properties:
            RestApiId: !Ref BdoApi
            Path: /v1/openapi.json
            Method: get
            Auth:
              ApiKeyRequired: false
        SwaggerUi:
          Type: Api
          Properties:
            RestApiId: !Ref BdoApi
            Path: /v1/docs
            Method: get
            Auth:
              ApiKeyRequired: false

Outputs:
  ApiUrl:
    Description: Base invoke URL for the /v1 API (requires x-api-key header)
    Value: !Sub 'https://${BdoApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiUrl'

  ApiId:
    Value: !Ref BdoApi
    Export:
      Name: !Sub '${AWS::StackName}-ApiId'

  OpenApiUrl:
    Description: Public OpenAPI document (no API key required)
    Value: !Sub 'https://${BdoApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/v1/openapi.json'

  DocsUrl:
    Description: Public Swagger UI (no API key required)
    Value: !Sub 'https://${BdoApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/v1/docs'

  CustomApiUrl:
    Condition: HasCustomDomain
    Description: Custom-domain base URL for the /v1 API (requires x-api-key header)
    Value: !Sub 'https://${ApiDomainName}/v1'
    Export:
      Name: !Sub '${AWS::StackName}-CustomApiUrl'

  DemoApiKeyId:
    Condition: HasDemoKey
    Description: >
      ID of the public read-only demo API key. Fetch its value with:
      aws apigateway get-api-key --api-key <this-id> --include-value
      --query value --output text  (the value is never stored in the repo).
    Value: !Ref DemoApiKey

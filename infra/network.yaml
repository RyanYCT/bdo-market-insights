AWSTemplateFormatVersion: '2010-09-09'
Description: >
  VPC, private subnets, route table, DynamoDB Gateway Endpoint,
  and security groups for bdo-market-insights.

Parameters:
  Stage:
    Type: String
    AllowedValues:
      - dev
      - prod

Resources:
  # ──────────────────────────────────────────────
  # VPC
  # ──────────────────────────────────────────────
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/24
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub 'bdo-${Stage}-vpc'

  # ──────────────────────────────────────────────
  # Private Subnets
  # ──────────────────────────────────────────────
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.0.0/25
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub 'bdo-${Stage}-private-a'

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.0.128/25
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub 'bdo-${Stage}-private-b'

  # ──────────────────────────────────────────────
  # Route Table (private — no internet routes)
  # ──────────────────────────────────────────────
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub 'bdo-${Stage}-private-rt'

  SubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTable

  SubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTable

  # ──────────────────────────────────────────────
  # DynamoDB Gateway VPC Endpoint
  # ──────────────────────────────────────────────
  DynamoDbEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.dynamodb'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable

  # ──────────────────────────────────────────────
  # Security Groups
  # ──────────────────────────────────────────────
  LambdaSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda functions
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub 'bdo-${Stage}-lambda-sg'

  RdsSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS Postgres
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub 'bdo-${Stage}-rds-sg'

  BastionSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for bastion host (EICE connectivity)
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub 'bdo-${Stage}-bastion-sg'

  # NOTE: Adding any standalone AWS::EC2::SecurityGroupEgress rule causes EC2 to
  # drop the implicit allow-all-egress rule for that SG, so each SG below is
  # restricted to exactly the egress declared here. In a no-NAT VPC (ADR-0006)
  # the only reachable destinations are in-VPC (RDS) and the DynamoDB gateway
  # endpoint (via its prefix list); the in-VPC Lambdas only need RDS, so 5432 is
  # all they require. The bastion additionally needs SSH egress to itself so the
  # co-located EICE can reach it (see BastionSshEgress).

  # -- Lambda SG Egress --
  LambdaToRdsEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref LambdaSG
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      DestinationSecurityGroupId: !Ref RdsSG
      Description: Allow Lambda to connect to RDS Postgres

  # ── RDS SG Ingress ──
  RdsFromLambdaIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RdsSG
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref LambdaSG
      Description: Allow inbound Postgres from Lambda

  RdsFromBastionIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RdsSG
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref BastionSG
      Description: Allow inbound Postgres from Bastion

  # -- Bastion SG Ingress --
  # The EC2 Instance Connect Endpoint shares this SG, so the bastion
  # instance must allow SSH from the same SG for the operator tunnel
  # (operator -> EICE -> bastion :22 -> RDS :5432) to form. Without this
  # rule the bastion is unreachable (NFR-19).
  BastionSshIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref BastionSG
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      SourceSecurityGroupId: !Ref BastionSG
      Description: Allow SSH from the EC2 Instance Connect Endpoint

  # -- Bastion SG Egress --
  # The EICE shares this SG and connects to the bastion on :22 with
  # PreserveClientIp=false, so the traffic's source is this SG. Because the
  # standalone egress rules below remove the implicit allow-all, the bastion
  # needs an explicit self-referencing SSH egress rule or the EICE cannot reach
  # it (operator -> EICE -> bastion :22). Without this the tunnel fails with
  # "Websocket Closure Reason: Unable to connect to target".
  BastionSshEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref BastionSG
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      DestinationSecurityGroupId: !Ref BastionSG
      Description: Allow the co-located EICE to reach the bastion on SSH

  BastionToRdsEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref BastionSG
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      DestinationSecurityGroupId: !Ref RdsSG
      Description: Allow Bastion to connect to RDS Postgres

Outputs:
  VpcId:
    Value: !Ref Vpc
    Export:
      Name: !Sub '${AWS::StackName}-VpcId'

  PrivateSubnetA:
    Value: !Ref PrivateSubnetA
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnetA'

  PrivateSubnetB:
    Value: !Ref PrivateSubnetB
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnetB'

  PrivateSubnetAAZ:
    Value: !GetAtt PrivateSubnetA.AvailabilityZone
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnetAAZ'

  LambdaSecurityGroupId:
    Value: !Ref LambdaSG
    Export:
      Name: !Sub '${AWS::StackName}-LambdaSecurityGroupId'

  RdsSecurityGroupId:
    Value: !Ref RdsSG
    Export:
      Name: !Sub '${AWS::StackName}-RdsSecurityGroupId'

  BastionSecurityGroupId:
    Value: !Ref BastionSG
    Export:
      Name: !Sub '${AWS::StackName}-BastionSecurityGroupId'

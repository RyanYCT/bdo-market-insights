AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  bdo-market-insights - Serverless market-data platform for Black Desert Online.
  Hourly ETL from arsha.io into RDS Postgres with analytics API.

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
  BdoRegion:
    Type: String
    Default: tw
    AllowedValues:
      - na
      - eu
      - sea
      - mena
      - kr
      - ru
      - jp
      - th
      - tw
      - sa
      - console_eu
      - console_na
      - console_asia
    Description: BDO server region passed through to ETL state machine input
  UseRdsProxy:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable RDS Proxy for Lambda connection pooling (adds ~$15/month)
  EnableBastion:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Deploy t4g.nano bastion for DBA access via EICE SSH tunnel

Conditions:
  DeployBastion: !Equals [!Ref EnableBastion, 'true']

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        STAGE: !Ref Stage
        BDO_REGION: !Ref BdoRegion
        POWERTOOLS_SERVICE_NAME: bdo-market-insights

Resources:
  NetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infra/network.yaml
      Parameters:
        Stage: !Ref Stage

  # Ordering after NetworkStack is enforced implicitly by the
  # !GetAtt NetworkStack.Outputs.* references below; an explicit
  # DependsOn would be redundant (cfn-lint W3005).
  DataStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infra/data.yaml
      Parameters:
        Stage: !Ref Stage
        UseRdsProxy: !Ref UseRdsProxy
        PrivateSubnetA: !GetAtt NetworkStack.Outputs.PrivateSubnetA
        PrivateSubnetB: !GetAtt NetworkStack.Outputs.PrivateSubnetB
        PrivateSubnetAAZ: !GetAtt NetworkStack.Outputs.PrivateSubnetAAZ
        RdsSecurityGroupId: !GetAtt NetworkStack.Outputs.RdsSecurityGroupId

  BastionStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployBastion
    Properties:
      TemplateURL: infra/bastion.yaml
      Parameters:
        Stage: !Ref Stage
        PrivateSubnetA: !GetAtt NetworkStack.Outputs.PrivateSubnetA
        BastionSecurityGroupId: !GetAtt NetworkStack.Outputs.BastionSecurityGroupId

  EtlStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infra/etl.yaml
      Parameters:
        Stage: !Ref Stage
        BdoRegion: !Ref BdoRegion
        LambdaSecurityGroupId: !GetAtt NetworkStack.Outputs.LambdaSecurityGroupId
        PrivateSubnetA: !GetAtt NetworkStack.Outputs.PrivateSubnetA
        DynamoDbTableName: !GetAtt DataStack.Outputs.DynamoDbTableName
        RdsEndpoint: !GetAtt DataStack.Outputs.RdsEndpoint
        RdsPort: !GetAtt DataStack.Outputs.RdsPort
        LambdaRdsAuthRoleArn: !GetAtt DataStack.Outputs.LambdaRdsAuthRoleArn
        LambdaMigratorRoleArn: !GetAtt DataStack.Outputs.LambdaMigratorRoleArn
    # Ordering after Network/Data is enforced by the !GetAtt *.Outputs
    # references above; an explicit DependsOn would be redundant (W3005).

  ApiStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infra/api.yaml
      Parameters:
        Stage: !Ref Stage
        BdoRegion: !Ref BdoRegion
        CommonLayerArn: !GetAtt EtlStack.Outputs.CommonLayerArn
        DynamoDbTableName: !GetAtt DataStack.Outputs.DynamoDbTableName
        LambdaSecurityGroupId: !GetAtt NetworkStack.Outputs.LambdaSecurityGroupId
        PrivateSubnetA: !GetAtt NetworkStack.Outputs.PrivateSubnetA
        RdsEndpoint: !GetAtt DataStack.Outputs.RdsEndpoint
        RdsPort: !GetAtt DataStack.Outputs.RdsPort
        LambdaRdsAuthRoleArn: !GetAtt DataStack.Outputs.LambdaRdsAuthRoleArn
    # Ordering after Network/Data/Etl is enforced by the !GetAtt *.Outputs
    # references above (incl. the shared CommonLayerArn); an explicit
    # DependsOn would be redundant (cfn-lint W3005).

  ObservabilityStack:
    Type: AWS::CloudFormation::Stack
    # EtlStack ordering is enforced by the !GetAtt below. ApiStack is not
    # referenced by output (alarms/log groups target it by name), so its
    # ordering is kept explicit via DependsOn (cfn-lint W3005-safe).
    DependsOn: ApiStack
    Properties:
      TemplateURL: infra/observability.yaml
      Parameters:
        Stage: !Ref Stage
        EtlStateMachineArn: !GetAtt EtlStack.Outputs.EtlStateMachineArn

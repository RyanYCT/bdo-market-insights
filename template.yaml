AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  bdo-market-insights - Serverless market-data platform for Black Desert Online.
  Hourly ETL from arsha.io into RDS Postgres with analytics API.

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
  BdoRegion:
    Type: String
    Default: tw
    AllowedValues:
      - na
      - eu
      - sea
      - mena
      - kr
      - ru
      - jp
      - th
      - tw
      - sa
      - console_eu
      - console_na
      - console_asia
    Description: BDO server region passed through to ETL state machine input
  UseRdsProxy:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable RDS Proxy for Lambda connection pooling (adds ~$15/month)
  EnableBastion:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Deploy t4g.nano bastion for DBA access via EICE SSH tunnel
  EnableDemoKey:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: >
      Publish a public read-only demo API key (tight usage plan; writes
      rejected by itemRegistry) for "try the API" links. Off by default.
  ApiDomainName:
    Type: String
    Default: ''
    Description: >
      Custom API hostname (e.g. api.example.com). Empty disables the custom
      domain. Supplied per stage at deploy time; not stored in committed config.
  HostedZoneId:
    Type: String
    Default: ''
    Description: Route 53 hosted zone ID for the parent domain (shared infra; ADR-0013).
  BedrockModelId:
    Type: String
    Default: 'us.amazon.nova-lite-v1:0'
    Description: Bedrock model ID for narrative summarisation (Converse API)
  BedrockFoundationModelId:
    Type: String
    Default: 'amazon.nova-lite-v1:0'
    Description: >
      Underlying foundation-model ID that BedrockModelId routes to (IAM scoping).
      Keep in sync with BedrockModelId; strip the region prefix for CRIS profiles.
  CatalogSyncSchedule:
    Type: String
    Default: 'cron(0 8 ? * THU *)'
    Description: >
      EventBridge cron (UTC) for the weekly full-catalog sync. Default Thu 08:00
      UTC (= Thu 16:00 UTC+8), a buffer after the Thu 03:00-07:00 UTC+8 BDO
      maintenance window (which can overrun on new-item patches).

Conditions:
  DeployBastion: !Equals [!Ref EnableBastion, 'true']

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        STAGE: !Ref Stage
        BDO_REGION: !Ref BdoRegion
        POWERTOOLS_SERVICE_NAME: bdo-market-insights

Resources:
  NetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infra/network.yaml
      Parameters:
        Stage: !Ref Stage

  # Ordering after NetworkStack is enforced implicitly by the
  # !GetAtt NetworkStack.Outputs.* references below; an explicit
  # DependsOn would be redundant (cfn-lint W3005).
  DataStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infra/data.yaml
      Parameters:
        Stage: !Ref Stage
        UseRdsProxy: !Ref UseRdsProxy
        PrivateSubnetA: !GetAtt NetworkStack.Outputs.PrivateSubnetA
        PrivateSubnetB: !GetAtt NetworkStack.Outputs.PrivateSubnetB
        PrivateSubnetAAZ: !GetAtt NetworkStack.Outputs.PrivateSubnetAAZ
        RdsSecurityGroupId: !GetAtt NetworkStack.Outputs.RdsSecurityGroupId

  BastionStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployBastion
    Properties:
      TemplateURL: infra/bastion.yaml
      Parameters:
        Stage: !Ref Stage
        PrivateSubnetA: !GetAtt NetworkStack.Outputs.PrivateSubnetA
        BastionSecurityGroupId: !GetAtt NetworkStack.Outputs.BastionSecurityGroupId

  EtlStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infra/etl.yaml
      Parameters:
        Stage: !Ref Stage
        BdoRegion: !Ref BdoRegion
        LambdaSecurityGroupId: !GetAtt NetworkStack.Outputs.LambdaSecurityGroupId
        PrivateSubnetA: !GetAtt NetworkStack.Outputs.PrivateSubnetA
        DynamoDbTableName: !GetAtt DataStack.Outputs.DynamoDbTableName
        RdsEndpoint: !GetAtt DataStack.Outputs.RdsEndpoint
        RdsPort: !GetAtt DataStack.Outputs.RdsPort
        LambdaRdsAuthRoleArn: !GetAtt DataStack.Outputs.LambdaRdsAuthRoleArn
        LambdaMigratorRoleArn: !GetAtt DataStack.Outputs.LambdaMigratorRoleArn
    # Ordering after Network/Data is enforced by the !GetAtt *.Outputs
    # references above; an explicit DependsOn would be redundant (W3005).

  InsightsStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infra/insights.yaml
      Parameters:
        Stage: !Ref Stage
        BdoRegion: !Ref BdoRegion
        CommonLayerArn: !GetAtt EtlStack.Outputs.CommonLayerArn
        LambdaSecurityGroupId: !GetAtt NetworkStack.Outputs.LambdaSecurityGroupId
        PrivateSubnetA: !GetAtt NetworkStack.Outputs.PrivateSubnetA
        RdsEndpoint: !GetAtt DataStack.Outputs.RdsEndpoint
        RdsPort: !GetAtt DataStack.Outputs.RdsPort
        LambdaRdsAuthRoleArn: !GetAtt DataStack.Outputs.LambdaRdsAuthRoleArn
        BedrockModelId: !Ref BedrockModelId
        BedrockFoundationModelId: !Ref BedrockFoundationModelId
    # Ordering after Network/Data/Etl is enforced by the !GetAtt *.Outputs
    # references above (incl. the shared CommonLayerArn); an explicit
    # DependsOn would be redundant (cfn-lint W3005).

  ApiStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infra/api.yaml
      Parameters:
        Stage: !Ref Stage
        BdoRegion: !Ref BdoRegion
        CommonLayerArn: !GetAtt EtlStack.Outputs.CommonLayerArn
        DynamoDbTableName: !GetAtt DataStack.Outputs.DynamoDbTableName
        LambdaSecurityGroupId: !GetAtt NetworkStack.Outputs.LambdaSecurityGroupId
        PrivateSubnetA: !GetAtt NetworkStack.Outputs.PrivateSubnetA
        RdsEndpoint: !GetAtt DataStack.Outputs.RdsEndpoint
        RdsPort: !GetAtt DataStack.Outputs.RdsPort
        LambdaRdsAuthRoleArn: !GetAtt DataStack.Outputs.LambdaRdsAuthRoleArn
        ApiDomainName: !Ref ApiDomainName
        HostedZoneId: !Ref HostedZoneId
        EnableDemoKey: !Ref EnableDemoKey
    # Ordering after Network/Data/Etl is enforced by the !GetAtt *.Outputs
    # references above (incl. the shared CommonLayerArn); an explicit
    # DependsOn would be redundant (cfn-lint W3005).

  CatalogStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: infra/catalog.yaml
      Parameters:
        Stage: !Ref Stage
        CommonLayerArn: !GetAtt EtlStack.Outputs.CommonLayerArn
        DynamoDbTableName: !GetAtt DataStack.Outputs.DynamoDbTableName
        CatalogSyncSchedule: !Ref CatalogSyncSchedule
    # Ordering after Data/Etl is enforced by the !GetAtt *.Outputs references
    # above (incl. the shared CommonLayerArn); an explicit DependsOn would be
    # redundant (cfn-lint W3005).

  ObservabilityStack:
    Type: AWS::CloudFormation::Stack
    # EtlStack ordering is enforced by the !GetAtt below. ApiStack is not
    # referenced by output (alarms/log groups target it by name), so its
    # ordering is kept explicit via DependsOn (cfn-lint W3005-safe).
    DependsOn: ApiStack
    Properties:
      TemplateURL: infra/observability.yaml
      Parameters:
        Stage: !Ref Stage
        EtlStateMachineArn: !GetAtt EtlStack.Outputs.EtlStateMachineArn
        InsightsStateMachineArn: !GetAtt InsightsStack.Outputs.InsightsStateMachineArn

name: CI

on:
  push:
    branches: [redesign-v3]
    tags: ['v*']
  pull_request:
    branches: [redesign-v3]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run mypy src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run pytest -m "not integration"

  integration:
    runs-on: ubuntu-latest
    needs: [typecheck]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bdo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bdo_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run pytest -m integration

  audit:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run pip-audit

  scan:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run bandit -r src/ -c pyproject.toml

  validate:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
      - uses: aws-actions/setup-sam@v2
      - run: uv sync
      - run: sam validate --lint

  deploy:
    runs-on: ubuntu-latest
    needs: [test, integration, audit, scan, validate]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
      - uses: aws-actions/setup-sam@v2
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1
      - run: uv sync
      - run: sam build
      - run: sam deploy --config-env prod --no-confirm-changeset
      # Run schema migrations from inside the VPC. CI cannot reach the private
      # RDS directly, so it invokes the migrator Lambda (control plane); the
      # function connects to RDS as `lambda_migrator` via IAM auth and runs
      # `alembic upgrade head`. The deploy role needs lambda:InvokeFunction on
      # bdo-prod-migrator. One-time role bootstrap (0001-0003) is still applied
      # via the bastion as the master user (docs/runbook.md).
      - name: Run database migrations (in-VPC migrator Lambda)
        run: |
          aws lambda invoke --function-name bdo-prod-migrator \
            --cli-binary-format raw-in-base64-out --payload '{}' \
            /tmp/migrate.json
          echo "migrator response:"; cat /tmp/migrate.json; echo
          python -c "import json,sys; r=json.load(open('/tmp/migrate.json')); print('head:', r.get('head')); sys.exit(0 if r.get('status') == 'ok' else 1)"

version = 0.1

[default.build.parameters]
cached = true
parallel = true

[dev.deploy.parameters]
stack_name = "bdo-market-dev"
resolve_s3 = true
s3_prefix = "bdo-market-insights"
region = "us-east-1"
confirm_changeset = true
capabilities = "CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND"
parameter_overrides = "Stage=dev BdoRegion=tw UseRdsProxy=false EnableBastion=false"

[prod.deploy.parameters]
stack_name = "bdo-market-prod"
resolve_s3 = true
s3_prefix = "bdo-market-insights"
region = "us-east-1"
confirm_changeset = true
capabilities = "CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND"
parameter_overrides = "Stage=prod BdoRegion=tw UseRdsProxy=false EnableBastion=false"

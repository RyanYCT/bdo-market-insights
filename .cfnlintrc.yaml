# cfn-lint configuration.
#
# infra/openapi.yaml is an OpenAPI 3.1 document generated by
# scripts/export_openapi.py (see the `openapi` CI job), not a CloudFormation
# template. Exclude it so a broad `cfn-lint template.yaml infra/*.yaml` glob
# does not try to lint it as CloudFormation.
ignore_templates:
  - infra/openapi.yaml
